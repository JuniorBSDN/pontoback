<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoBack | Totem Acadêmico</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #10b981; /* Verde Matrix */
            --bg: #030712;
            --card: #111827;
            --success: #059669;
            --danger: #dc2626;
        }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #1f2937;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }
        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin: 20px 0;
            border: 2px solid var(--primary) !important;
        }
        .status-msg {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(3, 7, 18, 0.95);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
            text-align: center;
            padding: 20px;
        }
        .icon-check { font-size: 80px; color: var(--primary); margin-bottom: 20px; }
        .icon-error { font-size: 80px; color: var(--danger); margin-bottom: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1 style="color: var(--primary); font-size: 1.5rem; margin-bottom: 0.5rem;">TOTEM ACADÊMICO</h1>
    <p id="nome-escola" style="color: #94a3b8; margin-bottom: 1rem;">Carregando unidade...</p>

    <div id="reader"></div>

    <p style="color: #64748b; font-size: 0.9rem;">Aproxime seu QR Code da câmera</p>
    <button onclick="localStorage.clear(); location.reload();" style="margin-top: 20px; background: none; border: 1px solid #334155; color: #64748b; cursor: pointer; padding: 5px 10px; border-radius: 5px;">Deslogar</button>
</div>

<div id="feedback-tela" class="status-msg">
    <div id="feedback-icon" class="icon-check">✔</div>
    <h2 id="feedback-titulo" style="font-size: 2rem;">PRESENÇA CONFIRMADA!</h2>
    <p id="nome-aluno-feedback" style="color: var(--primary); font-size: 1.5rem; margin-top: 10px;"></p>
    <p id="detalhes-aluno" style="color: #94a3b8; margin-top: 5px;"></p>
</div>

<script>
    const API_URL = "https://pontoback-tau.vercel.app/api";
    let config = JSON.parse(localStorage.getItem("config_tablet_alunos"));

    function iniciarCamera() {
        const scanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        });
        scanner.render(onScanSuccess);
    }

    async function onScanSuccess(decodedText) {
        if (window.processando) return;
        window.processando = true;

        const matriculaLimpa = decodedText.trim();

        try {
            const res = await fetch(`${API_URL}/presencas`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id_aluno: matriculaLimpa,
                    id_cliente: config.id
                })
            });

            const data = await res.json();

            if (res.ok) {
                exibirFeedback(true, data.aluno.nome, `Matrícula: ${data.aluno.matricula}`);
            } else {
                exibirFeedback(false, "ERRO", data.erro || "Aluno não encontrado");
            }
        } catch (e) {
            console.error("Erro no envio:", e);
            exibirFeedback(false, "ERRO DE CONEXÃO", "Verifique a internet");
        } finally {
            // Libera para nova leitura após 5 segundos
            setTimeout(() => { window.processando = false; }, 5000);
        }
    }

    function exibirFeedback(sucesso, titulo, subtitulo) {
        const tela = document.getElementById('feedback-tela');
        const icon = document.getElementById('feedback-icon');
        const tituloTxt = document.getElementById('feedback-titulo');
        const nomeTxt = document.getElementById('nome-aluno-feedback');
        const detalhesTxt = document.getElementById('detalhes-aluno');

        if (sucesso) {
            icon.innerHTML = "✔";
            icon.className = "icon-check";
            tituloTxt.innerText = "PRESENÇA CONFIRMADA!";
            tituloTxt.style.color = "white";
            nomeTxt.innerText = titulo;
            detalhesTxt.innerText = subtitulo;
        } else {
            icon.innerHTML = "✖";
            icon.className = "icon-error";
            tituloTxt.innerText = titulo;
            tituloTxt.style.color = "var(--danger)";
            nomeTxt.innerText = subtitulo;
            detalhesTxt.innerText = "";
        }

        tela.style.display = 'flex';

        setTimeout(() => {
            tela.style.display = 'none';
        }, 4000);
    }

    // Lógica de Ativação
    if (!config) {
        const code = prompt("Digite o TOKEN de ativação da unidade:");
        if (code) {
            try {
                // Decodifica o Token (que é um Base64 do JSON da unidade)
                const unidade = JSON.parse(atob(code));
                localStorage.setItem("config_tablet_alunos", JSON.stringify(unidade));
                location.reload();
            } catch(e) {
                alert("Token de ativação inválido!");
            }
        }
    } else {
        document.getElementById('nome-escola').innerText = config.nome;
        iniciarCamera();
    }
</script>
</body>
</html>
